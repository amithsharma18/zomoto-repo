apiVersion: apps/v1
kind: Deployment
metadata:
  name: zomato-deployment
  labels:
    app: zomato

spec:
  replicas: 2

  selector:
    matchLabels:
      app: zomato

  template:
    metadata:
      labels:
        app: zomato

    spec:
      containers:
      - name: zomato-container
        image: amith1808/zomoto-hub:v1
        imagePullPolicy: Always

        ports:
        - containerPort: 80
