apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: "node-exporter"
        static_configs:
          - targets:
            # Replace with your k8s_master and k8s_worker IPs from inventory.ini
            - "184.72.16.249:9100"
            - "18.145.115.195:9100"
